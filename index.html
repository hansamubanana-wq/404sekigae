<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 席替えツール</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  background:
    radial-gradient(circle at 15% 10%, #c7f0ff, transparent 28%),
    radial-gradient(circle at 90% 85%, #ffd6e8, transparent 30%),
    linear-gradient(135deg, #f8fbff, #f7f2ff);
  color: #1f2937;
  padding: 28px;
}

.app {
  max-width: 1180px;
  margin: auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 16px;
  margin-bottom: 20px;
}

h1 {
  margin: 0;
  font-size: 34px;
}

.sub {
  color: #64748b;
  margin-top: 4px;
  font-weight: 600;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button {
  border: 0;
  padding: 12px 18px;
  border-radius: 999px;
  font-weight: 900;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  box-shadow: 0 10px 22px rgba(37, 99, 235, .25);
  transition: .15s;
}

button.secondary {
  background: white;
  color: #334155;
  border: 1px solid #d8e0ec;
  box-shadow: 0 8px 18px rgba(15, 23, 42, .08);
}

button:hover { transform: translateY(-1px); }

button:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.classroom {
  background: rgba(255,255,255,.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 28px;
  padding: 28px;
  box-shadow: 0 28px 70px rgba(31, 41, 55, .15);
}

.front {
  display: flex;
  justify-content: center;
  margin-bottom: 26px;
}

.desk {
  width: 230px;
  text-align: center;
  padding: 13px;
  border-radius: 15px;
  background: #1e293b;
  color: white;
  font-weight: 900;
  letter-spacing: .24em;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 16px;
}

.seat {
  min-height: 88px;
  border-radius: 18px;
  padding: 10px 12px;
  background: linear-gradient(180deg, #ffffff, #edf7ff);
  border: 2px solid #8fc5f2;
  box-shadow: 0 10px 20px rgba(30, 64, 175, .10);
  cursor: pointer;
  position: relative;
  transition: .18s;
}

.seat.girl {
  background: linear-gradient(180deg, #ffffff, #fff0f6);
  border-color: #f3a6c4;
  box-shadow: 0 10px 20px rgba(190, 24, 93, .10);
}

.seat.hidden {
  opacity: .18;
  filter: blur(2px);
}

.seat.reveal {
  animation: reveal .45s ease both;
}

@keyframes reveal {
  from {
    opacity: 0;
    transform: scale(.78) translateY(16px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.seat:hover {
  transform: translateY(-3px);
}

.seat.locked {
  outline: 4px solid #111827;
}

.empty {
  min-height: 88px;
  border-radius: 18px;
  border: 2px dashed #cbd5e1;
  background: rgba(255,255,255,.35);
}

.no {
  font-size: 12px;
  font-weight: 900;
  color: #64748b;
}

.kana {
  margin-top: 2px;
  font-size: 11px;
  color: #94a3b8;
}

.name {
  margin-top: 7px;
  font-size: 18px;
  font-weight: 900;
}

.lock {
  position: absolute;
  right: 10px;
  top: 8px;
}

.announcement {
  margin-top: 20px;
  min-height: 72px;
  padding: 18px;
  border-radius: 20px;
  background: #111827;
  color: white;
  text-align: center;
  font-weight: 900;
  font-size: 24px;
  box-shadow: 0 18px 35px rgba(15, 23, 42, .22);
}

.announcement small {
  display: block;
  font-size: 13px;
  opacity: .7;
  margin-bottom: 4px;
}

.note {
  margin-top: 14px;
  color: #64748b;
  font-size: 13px;
}

@media print {
  body {
    background: white;
    padding: 0;
  }
  .controls, .note, .announcement {
    display: none;
  }
  .classroom {
    box-shadow: none;
    border: none;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div>
      <h1>404 席替えツール</h1>
    </div>

    <div class="controls">
      <button id="shuffleBtn" onclick="shuffleSeats()">席替えする</button>
      <button class="secondary" id="resetBtn" onclick="resetSeats()">元に戻す</button>
      <button class="secondary" onclick="window.print()">印刷</button>
    </div>
  </div>

  <div class="classroom">
    <div class="front">
      <div class="desk">教卓</div>
    </div>

    <div id="grid" class="grid"></div>

    <div id="announcement" class="announcement">
      <small>発表</small>
      席替えボタンを押してスタート
    </div>

    <div class="note">席をクリックすると固定できます。固定席は席替えしても動きません。</div>
  </div>
</div>

<script>
const studentsOriginal = [
  { no: 1, name: "天野 紗希", kana: "あまの さき", gender: "girl" },
  { no: 2, name: "岩澤 爾七", kana: "いわさわ にな", gender: "girl" },
  { no: 3, name: "岩舘 美桜", kana: "いわだて みお", gender: "girl" },
  { no: 4, name: "大住 旬", kana: "おおすみ しゅん", gender: "boy" },
  { no: 5, name: "大八木 桃実", kana: "おおやぎ もみ", gender: "girl" },
  { no: 6, name: "大山 航平", kana: "おおやま こうへい", gender: "boy" },
  { no: 7, name: "沖 愛佳", kana: "おき まなか", gender: "girl" },
  { no: 8, name: "小野 遥", kana: "おの はるか", gender: "girl" },
  { no: 9, name: "上條 優衣", kana: "かみじょう ゆい", gender: "girl" },
  { no: 10, name: "川原 愛生", kana: "かわはら あい", gender: "girl" },
  { no: 11, name: "黒川 晃世", kana: "くろかわ こうせい", gender: "boy" },
  { no: 12, name: "郷地 翔大", kana: "ごうち しょうた", gender: "boy" },
  { no: 13, name: "小島 朱莉", kana: "こじま あかり", gender: "girl" },
  { no: 14, name: "小林 美海", kana: "こばやし みうみ", gender: "girl" },
  { no: 15, name: "頃安 誠", kana: "ごろやす まこと", gender: "boy" },
  { no: 16, name: "崔 紗会", kana: "さい さえ", gender: "girl" },
  { no: 17, name: "佐子 凛夏", kana: "さこ りんか", gender: "girl" },
  { no: 18, name: "鈴木 僚太", kana: "すずき りょうた", gender: "boy" },
  { no: 19, name: "瀬戸 康太", kana: "せと こうた", gender: "boy" },
  { no: 20, name: "高橋 直太", kana: "たかはし なおた", gender: "boy" },
  { no: 21, name: "瀧澤 遼", kana: "たきざわ りょう", gender: "boy" },
  { no: 22, name: "武田 頼景", kana: "たけだ よりかげ", gender: "boy" },
  { no: 23, name: "田中 譲太郎", kana: "たなか じょうたろう", gender: "boy" },
  { no: 24, name: "土蔵 創一", kana: "つちくら そういち", gender: "boy" },
  { no: 25, name: "中尾 結衣子", kana: "なかお ゆいこ", gender: "girl" },
  { no: 26, name: "中村 純羽", kana: "なかむら すみは", gender: "boy" },
  { no: 27, name: "橋本 かれん", kana: "はしもと かれん", gender: "girl" },
  { no: 28, name: "東 暖大", kana: "ひがし はると", gender: "boy" },
  { no: 29, name: "平井 結芽", kana: "ひらい ゆめ", gender: "girl" },
  { no: 30, name: "福島 創士", kana: "ふくしま そうし", gender: "boy" },
  { no: 31, name: "藤井 千夏", kana: "ふじい ちなつ", gender: "girl" },
  { no: 32, name: "古谷 太一", kana: "ふるや たいち", gender: "boy" },
  { no: 33, name: "壬生 周太郎", kana: "みぶ しゅうたろう", gender: "boy" },
  { no: 34, name: "宮田 花帆", kana: "みやた かほ", gender: "girl" },
  { no: 35, name: "宮本 航希", kana: "みやもと こうき", gender: "boy" },
  { no: 36, name: "柳川 大河", kana: "やながわ たいが", gender: "boy" },
  { no: 37, name: "山崎 唯翔", kana: "やまざき ゆいと", gender: "boy" },
  { no: 38, name: "横山 蓉", kana: "よこやま よう", gender: "boy" },
  { no: 39, name: "吉田 芽生", kana: "よしだ めい", gender: "girl" }
];

const emptyPositions = new Set([
  "0-0",
  "0-6",
  "5-0"
]);

const rows = 6;
const cols = 7;

let seats = createInitialSeats();
let locked = new Set();
let revealing = false;
let visibleSeats = new Set();

function createSeatPositionsColumnFirst() {
  const positions = [];

  for (let col = 0; col < cols; col++) {
    for (let row = 0; row < rows; row++) {
      const key = `${row}-${col}`;
      if (!emptyPositions.has(key)) {
        positions.push(key);
      }
    }
  }

  return positions;
}

const realSeatPositions = createSeatPositionsColumnFirst();

function createInitialSeats() {
  const result = {};
  const sorted = [...studentsOriginal].sort((a, b) => a.no - b.no);
  const positions = createSeatPositionsColumnFirst();

  sorted.forEach((student, i) => {
    result[positions[i]] = student;
  });

  return result;
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const key = `${row}-${col}`;

      if (emptyPositions.has(key)) {
        const empty = document.createElement("div");
        empty.className = "empty";
        grid.appendChild(empty);
        continue;
      }

      const s = seats[key];
      const seat = document.createElement("div");

      seat.className = `seat ${s.gender}`;
      if (locked.has(key)) seat.classList.add("locked");
      if (revealing && !visibleSeats.has(key)) seat.classList.add("hidden");
      if (revealing && visibleSeats.has(key)) seat.classList.add("reveal");

      seat.onclick = () => {
        if (revealing) return;
        locked.has(key) ? locked.delete(key) : locked.add(key);
        render();
      };

      seat.innerHTML = `
        <div class="no">404-${s.no}</div>
        <div class="kana">${s.kana}</div>
        <div class="name">${s.name}</div>
        <div class="lock">${locked.has(key) ? "🔒" : ""}</div>
      `;

      grid.appendChild(seat);
    }
  }
}

function shuffleArray(array) {
  const a = [...array];

  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }

  return a;
}

async function shuffleSeats() {
  if (revealing) return;

  document.getElementById("shuffleBtn").disabled = true;
  document.getElementById("resetBtn").disabled = true;

  const movablePositions = realSeatPositions.filter(pos => !locked.has(pos));
  const movableStudents = movablePositions.map(pos => seats[pos]);
  const shuffledStudents = shuffleArray(movableStudents);

  movablePositions.forEach((pos, i) => {
    seats[pos] = shuffledStudents[i];
  });

  revealing = true;
  visibleSeats = new Set([...locked]);

  document.getElementById("announcement").innerHTML =
    `<small>席替え中</small>順番に発表します…`;

  render();

  const revealOrder = shuffleArray(movablePositions);

  for (const pos of revealOrder) {
    visibleSeats.add(pos);

    const s = seats[pos];
    const [row, col] = pos.split("-").map(Number);

    document.getElementById("announcement").innerHTML = `
      <small>${row + 1}列目・${col + 1}番</small>
      404-${s.no}　${s.name}
    `;

    render();

    await sleep(450);
  }

  revealing = false;
  visibleSeats.clear();

  document.getElementById("announcement").innerHTML =
    `<small>完了</small>席替え完了！`;

  document.getElementById("shuffleBtn").disabled = false;
  document.getElementById("resetBtn").disabled = false;

  render();
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function resetSeats() {
  if (revealing) return;

  seats = createInitialSeats();
  locked.clear();
  visibleSeats.clear();
  revealing = false;

  document.getElementById("announcement").innerHTML =
    `<small>発表</small>席替えボタンを押してスタート`;

  render();
}

render();
</script>
</body>
</html>
