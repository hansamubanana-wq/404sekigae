<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
<title>404 席替えツール</title>

<style>
* { box-sizing: border-box; }

html, body { height: 100%; }

body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
  background:
    radial-gradient(circle at 15% 10%, #c7f0ff, transparent 28%),
    radial-gradient(circle at 90% 85%, #ffd6e8, transparent 30%),
    linear-gradient(135deg, #f8fbff, #f7f2ff);
  color: #1f2937;
  padding: 16px 22px;
}

.app {
  max-width: 1180px;
  height: 100%;
  margin: auto;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}

h1 { margin: 0; font-size: 28px; }

.controls { display: flex; gap: 10px; flex-wrap: wrap; }

button {
  border: 0;
  padding: 12px 18px;
  border-radius: 999px;
  font-weight: 900;
  cursor: pointer;
  color: white;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  box-shadow: 0 10px 22px rgba(37, 99, 235, .25);
  transition: .15s;
}

button.secondary {
  background: white;
  color: #334155;
  border: 1px solid #d8e0ec;
  box-shadow: 0 8px 18px rgba(15, 23, 42, .08);
}

button:hover { transform: translateY(-1px); }

button:disabled {
  opacity: .5;
  cursor: not-allowed;
  transform: none;
}

.classroom {
  background: rgba(255,255,255,.8);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.9);
  border-radius: 28px;
  padding: 18px;
  box-shadow: 0 28px 70px rgba(31, 41, 55, .15);
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.front {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}

.desk {
  width: 230px;
  text-align: center;
  padding: 9px;
  border-radius: 15px;
  background: #1e293b;
  color: white;
  font-weight: 900;
  letter-spacing: .24em;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 12px;
  flex: 1;
  min-height: 0;
}

.seat {
  min-height: 0;
  border-radius: 18px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  background: linear-gradient(180deg, #ffffff, #edf7ff);
  border: 2px solid #8fc5f2;
  box-shadow: 0 10px 20px rgba(30, 64, 175, .10);
  cursor: pointer;
  position: relative;
  transition: .18s;
}

.seat.girl {
  background: linear-gradient(180deg, #ffffff, #fff0f6);
  border-color: #f3a6c4;
  box-shadow: 0 10px 20px rgba(190, 24, 93, .10);
}

.seat.reveal { animation: pop-in .5s cubic-bezier(.17,.67,.3,1.4) both; }

@keyframes pop-in {
  from { opacity: 0; transform: scale(.6) rotateY(90deg); }
  70%  { transform: scale(1.08) rotateY(-5deg); }
  to   { opacity: 1; transform: scale(1) rotateY(0); }
}

.seat:hover { transform: translateY(-3px); }

.seat.locked { outline: 4px solid #111827; }

.empty {
  min-height: 0;
  border-radius: 18px;
  border: 2px dashed #cbd5e1;
  background: rgba(255,255,255,.35);
}

.no   { font-size: 12px; font-weight: 900; color: #64748b; }
.kana { margin-top: 2px; font-size: 11px; color: #94a3b8; }
.name { margin-top: 4px; font-size: 16px; font-weight: 900; }

.lock { position: absolute; right: 10px; top: 8px; }

/* overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(17, 24, 39, .9);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  color: white;
  font-weight: 900;
  text-align: center;
  transition: opacity .45s ease;
}

.countdown-num {
  display: block;
  font-size: 120px;
  line-height: 1;
  animation: num-pop .6s cubic-bezier(.17,.67,.3,1.5) both;
}

@keyframes num-pop {
  from { transform: scale(.2); opacity: 0; }
  70%  { transform: scale(1.2); }
  to   { transform: scale(1); opacity: 1; }
}

.reveal-text {
  font-size: 36px;
  animation: pop-in .4s ease both;
}

/* confetti */
.confetti-piece {
  position: fixed;
  top: -14px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 200;
  animation: confetti-fall linear forwards;
}

@keyframes confetti-fall {
  to { transform: translateY(110vh) rotate(800deg); opacity: 0; }
}

/* print */
@media print {
  html, body {
    height: auto !important;
    overflow: visible !important;
    background: white !important;
    padding: 8mm !important;
  }
  .app {
    display: block !important;
    height: auto !important;
    max-width: 100% !important;
  }
  .header { margin-bottom: 6mm; }
  .controls { display: none !important; }
  .classroom {
    display: block !important;
    flex: none !important;
    background: white !important;
    backdrop-filter: none !important;
    box-shadow: none !important;
    border: none !important;
    padding: 0 !important;
  }
  .grid {
    display: grid !important;
    grid-template-rows: auto !important;
    height: auto !important;
    gap: 6px !important;
  }
  .seat {
    min-height: 52px !important;
    box-shadow: none !important;
    break-inside: avoid;
  }
  .overlay { display: none !important; }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <h1>404 席替えツール</h1>
    <div class="controls">
      <button id="shuffleBtn" onclick="shuffleSeats()">席替えする</button>
      <button class="secondary" id="saveBtn" onclick="saveSeats()">保存</button>
      <button class="secondary" id="resetBtn" onclick="resetSeats()">元に戻す</button>
      <button class="secondary" onclick="window.print()">印刷</button>
    </div>
  </div>

  <div class="classroom">
    <div class="front"><div class="desk">教卓</div></div>
    <div id="grid" class="grid"></div>
  </div>
</div>

<div id="overlay" class="overlay" style="display:none">
  <div id="overlayContent"></div>
</div>

<script>
const studentsOriginal = [
  { no: 1,  name: "天野 紗希",   kana: "あまの さき",       gender: "girl" },
  { no: 2,  name: "岩澤 爾七",   kana: "いわさわ にな",     gender: "girl" },
  { no: 3,  name: "岩舘 美桜",   kana: "いわだて みお",     gender: "girl" },
  { no: 4,  name: "大住 旬",     kana: "おおすみ しゅん",   gender: "boy"  },
  { no: 5,  name: "大八木 桃実", kana: "おおやぎ もみ",     gender: "girl" },
  { no: 6,  name: "大山 航平",   kana: "おおやま こうへい", gender: "boy"  },
  { no: 7,  name: "沖 愛佳",     kana: "おき まなか",       gender: "girl" },
  { no: 8,  name: "小野 遥",     kana: "おの はるか",       gender: "girl" },
  { no: 9,  name: "上條 優衣",   kana: "かみじょう ゆい",   gender: "girl" },
  { no: 10, name: "川原 愛生",   kana: "かわはら あい",     gender: "girl" },
  { no: 11, name: "黒川 晃世",   kana: "くろかわ こうせい", gender: "boy"  },
  { no: 12, name: "郷地 翔大",   kana: "ごうち しょうた",   gender: "boy"  },
  { no: 13, name: "小島 朱莉",   kana: "こじま あかり",     gender: "girl" },
  { no: 14, name: "小林 美海",   kana: "こばやし みうみ",   gender: "girl" },
  { no: 15, name: "頃安 誠",     kana: "ごろやす まこと",   gender: "boy"  },
  { no: 16, name: "崔 紗会",     kana: "さい さえ",         gender: "girl" },
  { no: 17, name: "佐子 凛夏",   kana: "さこ りんか",       gender: "girl" },
  { no: 18, name: "鈴木 僚太",   kana: "すずき りょうた",   gender: "boy"  },
  { no: 19, name: "瀬戸 康太",   kana: "せと こうた",       gender: "boy"  },
  { no: 20, name: "高橋 直太",   kana: "たかはし なおた",   gender: "boy"  },
  { no: 21, name: "瀧澤 遼",     kana: "たきざわ りょう",   gender: "boy"  },
  { no: 22, name: "武田 頼景",   kana: "たけだ よりかげ",   gender: "boy"  },
  { no: 23, name: "田中 譲太郎", kana: "たなか じょうたろう", gender: "boy" },
  { no: 24, name: "土蔵 創一",   kana: "つちくら そういち", gender: "boy"  },
  { no: 25, name: "中尾 結衣子", kana: "なかお ゆいこ",     gender: "girl" },
  { no: 26, name: "中村 純羽",   kana: "なかむら すみは",   gender: "boy"  },
  { no: 27, name: "橋本 かれん", kana: "はしもと かれん",   gender: "girl" },
  { no: 28, name: "東 暖大",     kana: "ひがし はると",     gender: "boy"  },
  { no: 29, name: "平井 結芽",   kana: "ひらい ゆめ",       gender: "girl" },
  { no: 30, name: "福島 創士",   kana: "ふくしま そうし",   gender: "boy"  },
  { no: 31, name: "藤井 千夏",   kana: "ふじい ちなつ",     gender: "girl" },
  { no: 32, name: "古谷 太一",   kana: "ふるや たいち",     gender: "boy"  },
  { no: 33, name: "壬生 周太郎", kana: "みぶ しゅうたろう", gender: "boy"  },
  { no: 34, name: "宮田 花帆",   kana: "みやた かほ",       gender: "girl" },
  { no: 35, name: "宮本 航希",   kana: "みやもと こうき",   gender: "boy"  },
  { no: 36, name: "柳川 大河",   kana: "やながわ たいが",   gender: "boy"  },
  { no: 37, name: "山崎 唯翔",   kana: "やまざき ゆいと",   gender: "boy"  },
  { no: 38, name: "横山 蓉",     kana: "よこやま よう",     gender: "boy"  },
  { no: 39, name: "吉田 芽生",   kana: "よしだ めい",       gender: "girl" },
];

const emptyPositions = new Set(["0-0", "0-6", "5-0"]);
const rows = 6;
const cols = 7;

let seats = createInitialSeats();
let locked = new Set();
let justRevealed = false;
let busy = false;

function createSeatPositionsColumnFirst() {
  const positions = [];
  for (let col = 0; col < cols; col++) {
    for (let row = 0; row < rows; row++) {
      const key = `${row}-${col}`;
      if (!emptyPositions.has(key)) positions.push(key);
    }
  }
  return positions;
}

const realSeatPositions = createSeatPositionsColumnFirst();
const realSeatSet = new Set(realSeatPositions);

function checkGenderMix(seatMap) {
  for (const pos of realSeatPositions) {
    const [row, col] = pos.split("-").map(Number);
    const neighborGenders = [
      `${row-1}-${col}`, `${row+1}-${col}`,
      `${row}-${col-1}`, `${row}-${col+1}`,
    ]
      .filter(k => realSeatSet.has(k))
      .map(k => seatMap[k].gender);
    if (neighborGenders.length > 0 && new Set(neighborGenders).size === 1) return false;
  }
  return true;
}

function createInitialSeats() {
  const result = {};
  const sorted = [...studentsOriginal].sort((a, b) => a.no - b.no);
  const positions = createSeatPositionsColumnFirst();
  sorted.forEach((student, i) => { result[positions[i]] = student; });
  return result;
}

function saveSeats() {
  const data = {
    seats: Object.fromEntries(Object.entries(seats).map(([k, v]) => [k, v.no])),
    locked: [...locked],
  };
  localStorage.setItem("404seats", JSON.stringify(data));
  const btn = document.getElementById("saveBtn");
  const orig = btn.textContent;
  btn.textContent = "保存済！";
  setTimeout(() => { btn.textContent = orig; }, 1200);
}

function loadSeats() {
  const raw = localStorage.getItem("404seats");
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    const byNo = Object.fromEntries(studentsOriginal.map(s => [s.no, s]));
    const loaded = {};
    for (const [pos, no] of Object.entries(data.seats)) {
      if (byNo[no]) loaded[pos] = byNo[no];
    }
    if (Object.keys(loaded).length === realSeatPositions.length) {
      seats = loaded;
      locked = new Set(data.locked || []);
    }
  } catch {}
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const key = `${row}-${col}`;

      if (emptyPositions.has(key)) {
        const el = document.createElement("div");
        el.className = "empty";
        grid.appendChild(el);
        continue;
      }

      const s = seats[key];
      const seat = document.createElement("div");

      seat.className = `seat ${s.gender}`;
      if (locked.has(key)) seat.classList.add("locked");
      if (justRevealed && !locked.has(key)) seat.classList.add("reveal");

      seat.onclick = () => {
        if (busy) return;
        locked.has(key) ? locked.delete(key) : locked.add(key);
        render();
      };

      seat.innerHTML = `
        <div class="no">404-${s.no}</div>
        <div class="kana">${s.kana}</div>
        <div class="name">${s.name}</div>
        <div class="lock">${locked.has(key) ? "🔒" : ""}</div>
      `;

      grid.appendChild(seat);
    }
  }
}

function shuffleArray(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setBusy(state) {
  busy = state;
  ["shuffleBtn", "saveBtn", "resetBtn"].forEach(id => {
    document.getElementById(id).disabled = state;
  });
}

async function shuffleSeats() {
  if (busy) return;
  setBusy(true);

  const movablePositions = realSeatPositions.filter(pos => !locked.has(pos));
  const movableStudents = movablePositions.map(pos => seats[pos]);

  let candidate = seats;
  for (let attempt = 0; attempt < 2000; attempt++) {
    const shuffled = shuffleArray(movableStudents);
    candidate = { ...seats };
    movablePositions.forEach((pos, i) => { candidate[pos] = shuffled[i]; });
    if (checkGenderMix(candidate)) break;
  }
  seats = candidate;
  render();

  const overlay = document.getElementById("overlay");
  const content = document.getElementById("overlayContent");
  overlay.style.opacity = "1";
  overlay.style.display = "flex";

  for (const n of ["３", "２", "１"]) {
    content.innerHTML = `<span class="countdown-num">${n}</span>`;
    await sleep(750);
  }

  content.innerHTML = `<div class="reveal-text">🎊　新しい席が決まりました！　🎊</div>`;
  await sleep(400);

  justRevealed = true;
  render();
  launchConfetti();

  overlay.style.opacity = "0";
  await sleep(450);
  overlay.style.display = "none";

  justRevealed = false;
  render();
  setBusy(false);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function launchConfetti() {
  const colors = ["#2563eb", "#7c3aed", "#f43f5e", "#f59e0b", "#10b981", "#06b6d4", "#ec4899"];
  for (let i = 0; i < 100; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    const size = 7 + Math.random() * 8;
    el.style.cssText = [
      `left:${Math.random() * 100}vw`,
      `background:${colors[i % colors.length]}`,
      `width:${size}px`,
      `height:${size}px`,
      `animation-delay:${Math.random() * .5}s`,
      `animation-duration:${1.2 + Math.random() * .9}s`,
    ].join(";");
    document.body.appendChild(el);
    el.addEventListener("animationend", () => el.remove());
  }
}

function resetSeats() {
  if (busy) return;
  seats = createInitialSeats();
  locked.clear();
  justRevealed = false;
  render();
}

loadSeats();
render();
</script>
</body>
</html>
